# SonarCloud configuration for cicd-practice-app
sonar.projectKey=jmpangilinan_cicd-practice-app
sonar.organization=jmpangilinan

sonar.projectName=cicd-practice-app
sonar.projectVersion=1.0

# Define what folders contain our application source code vs test code
sonar.sources=src
sonar.tests=tests,src
sonar.test.inclusions=src/**/*.test.js,tests/**/*.spec.js
sonar.exclusions=src/**/*.test.js

# Point SonarQube to the test coverage report Jest generates
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Set the encoding
sonar.sourceEncoding=UTF-8
