# Docker Build & Push Workflow
# Builds a Docker image and pushes it to GitHub Container Registry (GHCR)
# on every push to the `main` branch.

name: Docker — Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:           # Allow manual triggers from GitHub UI

env:
  REGISTRY: ghcr.io
  # The image name will be: ghcr.io/<your-github-username>/cicd-practice-app
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # Required to push to GHCR

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # Auto-provided by GitHub

      # 3. Extract metadata (tags & labels) for the image
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-          # e.g. sha-abc1234
            type=ref,event=branch         # e.g. main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # 4. Set up Docker Buildx (for multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Build and push the image
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha            # Use GitHub Actions cache
          cache-to: type=gha,mode=max
